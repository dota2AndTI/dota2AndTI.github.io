<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Screen Mirror Cast Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #cover {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            z-index: 10;
        }
        .media-video {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            z-index: 1;
        }
        #castImage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            z-index: 2;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <img id="cover" class="hidden" alt="Cover" />
    <img id="castImage" class="hidden" alt="Cast Image" />
    <video id="cafVideo" class="media-video hidden" autoplay playsinline></video>
    <video id="mirrorVideo" class="media-video hidden" autoplay playsinline muted></video>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <script>
        const cafVideo = document.getElementById('cafVideo');
        const mirrorVideo = document.getElementById('mirrorVideo');
        const cover = document.getElementById('cover');
        const castImage = document.getElementById('castImage');

        var pc = null;
        var ws = null;
        var signalingServerIP = null;
        var signalingServerPort = 1118;
        var mirroringActive = false;
        var cafMediaActive = false;
        var cafMediaPending = false;
        var heartbeatTimer = null;

        const FIXED_COVER_URL = './cover.png';

        function showCover() {
            if (cover.src !== FIXED_COVER_URL) cover.src = FIXED_COVER_URL;
            cover.classList.remove('hidden');
        }

        function hideCover() {
            cover.classList.add('hidden');
        }

        function showCastImage(url) {
            if (!url) return;
            cafMediaPending = false;
            cafMediaActive = false;
            hideMirrorLayer();
            hideCAFLayer();
            if (castImage.src !== url) castImage.src = url;
            castImage.classList.remove('hidden');
            hideCover();
        }

        function hideCastImage() {
            castImage.classList.add('hidden');
        }

        function hideMirrorLayer() {
            mirrorVideo.classList.add('hidden');
            mirrorVideo.srcObject = null;
        }

        function showMirrorLayer() {
            cafMediaPending = false;
            cafMediaActive = false;
            hideCastImage();
            hideCAFLayer();
            mirrorVideo.classList.remove('hidden');
        }

        function hideCAFLayer() {
            cafVideo.classList.add('hidden');
        }

        function showCAFLayer() {
            hideCastImage();
            hideMirrorLayer();
            cafVideo.classList.remove('hidden');
        }

        function stopWebRTCConnection() {
            stopHeartbeat();
            if (ws) {
                ws.onclose = null;
                ws.close();
                ws = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            mirrorVideo.srcObject = null;
        }

        function stopCAFPlayback() {
            try {
                playerManager.stop();
            } catch (e) {}
            cafMediaPending = false;
            cafMediaActive = false;
        }

        function prepareMirrorPlayback() {
            cafMediaPending = false;
            cafMediaActive = false;
            mirroringActive = true;
            stopCAFPlayback();
            stopWebRTCConnection();
            showMirrorLayer();
            showCover();
        }

        function prepareCAFPlayback() {
            mirroringActive = false;
            signalingServerIP = null;
            cafMediaPending = true;
            cafMediaActive = false;
            stopWebRTCConnection();
            showCAFLayer();
            hideCover();
        }

        function closeWebRTC() {
            mirroringActive = false;
            signalingServerIP = null;
            stopWebRTCConnection();
            hideMirrorLayer();
            if (!cafMediaActive && !cafMediaPending) {
                showCover();
            }
        }

        function shouldShowIdleCover() {
            return hasSenderConnected && !mirroringActive && !cafMediaActive && !cafMediaPending;
        }

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        let hasSenderConnected = false;

        const CUSTOM_CHANNEL = 'urn:x-cast:com.screenmirror.webrtc';

        context.addCustomMessageListener(CUSTOM_CHANNEL, (event) => {
            let data = event.data;
            if (typeof data === 'string') {
                try {
                    data = JSON.parse(data);
                } catch (e) {
                    console.error('Failed to parse custom message JSON:', e);
                    return;
                }
            }

            if (data.type === 'start' && data.signalingIP) {
                signalingServerIP = data.signalingIP;
                signalingServerPort = Number(data.signalingPort || 1118);
                prepareMirrorPlayback();
                connectWebRTC(signalingServerIP, signalingServerPort);
            } else if (data.type === 'stop') {
                closeWebRTC();
            }
        });

        try {
            context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
                hasSenderConnected = true;
                if (shouldShowIdleCover()) {
                    showCover();
                }
            });
            context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
                hasSenderConnected = false;
                cafMediaPending = false;
                cafMediaActive = false;
                mirroringActive = false;
                signalingServerIP = null;
                stopCAFPlayback();
                stopWebRTCConnection();
                hideCover();
                hideCastImage();
                hideMirrorLayer();
                hideCAFLayer();
            });
        } catch (e) {
            console.warn('Cast sender event listener setup failed:', e);
        }

        try {
            playerManager.setMediaElement(cafVideo);

            const playbackConfig = new cast.framework.PlaybackConfig();
            playbackConfig.autoResumeDuration = 5;
            playbackConfig.autoPauseDuration = 0;
            playerManager.setPlaybackConfig(playbackConfig);

            function looksLikeImageUrl(url) {
                if (!url) return false;
                const u = String(url).toLowerCase();
                return (
                    u.endsWith('.jpg') ||
                    u.endsWith('.jpeg') ||
                    u.endsWith('.png') ||
                    u.endsWith('.webp') ||
                    u.endsWith('.gif') ||
                    u.includes('.jpg?') ||
                    u.includes('.jpeg?') ||
                    u.includes('.png?') ||
                    u.includes('.webp?') ||
                    u.includes('.gif?')
                );
            }

            function looksLikeVideoUrl(url) {
                if (!url) return false;
                const u = String(url).toLowerCase();
                return (
                    u.endsWith('.mp4') ||
                    u.endsWith('.m3u8') ||
                    u.endsWith('.webm') ||
                    u.endsWith('.mov') ||
                    u.endsWith('.ts') ||
                    u.endsWith('.mp3') ||
                    u.endsWith('.m4a') ||
                    u.includes('.mp4?') ||
                    u.includes('.m3u8?') ||
                    u.includes('/proxy/media/') ||
                    u.includes('videoplayback')
                );
            }

            function isPhotoMetadata(metadata) {
                try {
                    return metadata && metadata.metadataType === cast.framework.messages.MetadataType.PHOTO;
                } catch (e) {
                    return false;
                }
            }

            playerManager.setMessageInterceptor(
                cast.framework.messages.MessageType.LOAD,
                (loadRequestData) => {
                    try {
                        const media = loadRequestData && loadRequestData.media;
                        const contentId = media && media.contentId;
                        const contentType = (media && media.contentType) ? String(media.contentType).toLowerCase() : '';
                        const metadata = media && media.metadata;
                        const isVideo =
                            contentType.startsWith('video/') ||
                            contentType.startsWith('audio/') ||
                            contentType.includes('mpegurl') ||
                            looksLikeVideoUrl(contentId);
                        const isImage = !isVideo && (
                            contentType.startsWith('image/') ||
                            isPhotoMetadata(metadata) ||
                            looksLikeImageUrl(contentId)
                        );

                        if (isImage && contentId) {
                            mirroringActive = false;
                            signalingServerIP = null;
                            stopWebRTCConnection();
                            stopCAFPlayback();
                            hideCAFLayer();
                            showCastImage(String(contentId));
                        } else if (contentId) {
                            prepareCAFPlayback();
                        }
                    } catch (e) {
                        console.warn('LOAD interceptor failed:', e);
                    }
                    return loadRequestData;
                }
            );

            playerManager.addEventListener(
                cast.framework.events.EventType.PLAYER_STATE_CHANGED,
                (event) => {
                    const state = event && (event.playerState || event.value);
                    if (state && state !== 'IDLE') {
                        cafMediaPending = false;
                        cafMediaActive = true;
                        showCAFLayer();
                        hideCover();
                        return;
                    }
                    cafMediaActive = false;
                    if (shouldShowIdleCover()) {
                        hideCastImage();
                        showCover();
                    }
                }
            );

            playerManager.addEventListener(
                cast.framework.events.EventType.ERROR,
                () => {
                    cafMediaPending = false;
                    cafMediaActive = false;
                    if (shouldShowIdleCover()) {
                        showCover();
                    }
                }
            );
        } catch (e) {
            console.warn('PlayerManager setup failed:', e);
        }

        mirrorVideo.addEventListener('playing', () => {
            hideCover();
        }, { passive: true });

        cafVideo.addEventListener('playing', () => {
            cafMediaPending = false;
            cafMediaActive = true;
            hideCastImage();
            hideCover();
        }, { passive: true });

        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        context.start(options);

        function connectWebRTC(ip, port) {
            const wsUrl = 'ws://' + ip + ':' + port;
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                if (!mirroringActive) return;
                if (!pc) {
                    createPeerConnection();
                }
                ws.send(JSON.stringify({ type: 'ready' }));
                startHeartbeat();
            };

            ws.onmessage = async (event) => {
                if (typeof event.data !== 'string') return;
                const message = JSON.parse(event.data);
                if (message.type === 'offer') {
                    await handleOffer(message);
                } else if (message.type === 'ice-candidate') {
                    await handleIceCandidate(message);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                stopHeartbeat();
                const ip = signalingServerIP;
                const port = signalingServerPort;
                setTimeout(() => {
                    if (mirroringActive && ip) {
                        connectWebRTC(ip, port);
                    }
                }, 3000);
            };
        }

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatTimer = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
                }
            }, 10000);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }

        function createPeerConnection() {
            if (pc) {
                pc.close();
                pc = null;
            }

            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            pc.ontrack = (event) => {
                if (!mirroringActive) return;
                showMirrorLayer();
                if (event.streams && event.streams[0]) {
                    mirrorVideo.srcObject = event.streams[0];
                }
                if (event.track.kind === 'video') {
                    mirrorVideo.play().catch((e) => console.error('Mirror playback failed:', e));
                    hideCover();
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        }
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                if (!mirroringActive || !pc) return;
                if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    showCover();
                }
            };
        }

        async function handleOffer(message) {
            if (!mirroringActive) return;
            if (!pc) {
                createPeerConnection();
            }

            try {
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'offer',
                    sdp: message.sdp
                }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'answer',
                        sdp: answer.sdp
                    }));
                }
            } catch (error) {
                console.error('Failed to handle offer:', error);
            }
        }

        async function handleIceCandidate(message) {
            if (!pc || !mirroringActive) return;
            try {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
            } catch (error) {
                console.error('Failed to add ICE candidate:', error);
            }
        }
    </script>
</body>
</html>
